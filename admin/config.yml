# Decap CMS — https://decapcms.org/docs/github-backend/
#
# Netlify OAuth를 쓰는 경우
# - GitHub OAuth 앱의 Authorization callback URL:
#     https://api.netlify.com/auth/done
# - Netlify → Site configuration → Access & security → OAuth → GitHub 에 Client ID/Secret 등록
#   https://docs.netlify.com/security/oauth-provider-tokens/#setup-an-provider
#
# CMS를 GitHub Pages(22000510.github.io)에서 열면, 기본값으로 site_id 가 github.io 로 나갑니다.
# Netlify는 "Netlify에 연결된 사이트"만 인식하므로, 아래 site_domain 을 반드시
# Netlify 대시보드에 보이는 사이트 주소(예: random-name-123.netlify.app)로 바꿉니다.
#
# Netlify 없이 GitHub Pages만 쓸 때는 OAuth 프록시가 필요합니다.
# https://github.com/sterlingwes/decap-proxy

backend:
  name: github
  repo: 22000510/22000510.github.io
  branch: main
  base_url: https://api.netlify.com
  auth_endpoint: auth
  # 호스트만 (https·슬래시 없음).
  # Netlify 사이트가 "OAuth용 placeholder"만 있으면 /admin 은 404 — 저장소를 Netlify에 연결해 Jekyll 빌드(netlify.toml)해야 함.
  # 팝업이 "Authorized"에서 멈추면: postMessage/opener 이슈. 같은 Netlify URL의 /admin 에서 로그인 재시도 등.
  site_domain: ephemeral-creponne-6bdb92.netlify.app

media_folder: assets/img
public_folder: /assets/img

# Jekyll 글이 _posts/하위폴더/에 있어 폴더마다 컬렉션을 둡니다. _posts 바로 아래 .md 는 맨 아래 "Posts (root)".
# fields 는 YAML 앵커(*post_fields)로 공유.
collections:
  - name: posts_ccjava
    label: "C / C++ / Java"
    label_singular: post
    folder: "_posts/c,c++,java"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: md
    format: frontmatter
    fields: &post_fields
      - { label: Title, name: title, widget: string }
      - label: Publish date
        name: date
        widget: datetime
        date_format: YYYY-MM-DD
        time_format: HH:mm:ss
        format: YYYY-MM-DD HH:mm:ss Z
        picker_utc: false
      - label: Categories
        name: categories
        widget: list
        required: false
        field:
          label: Category
          name: category
          widget: string
      - label: Tag
        name: tag
        widget: list
        required: false
        field:
          label: Tag
          name: tag_item
          widget: string
      - { label: Body, name: body, widget: markdown }

  - name: posts_data_structure
    label: Data structure
    label_singular: post
    folder: _posts/data_structure
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: md
    format: frontmatter
    fields: *post_fields

  - name: posts_unity
    label: Unity
    label_singular: post
    folder: _posts/Unity
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: md
    format: frontmatter
    fields: *post_fields

  - name: posts_bci
    label: BCI
    label_singular: post
    folder: _posts/BCI
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: md
    format: frontmatter
    fields: *post_fields

  - name: posts_mecro
    label: Mecro
    label_singular: post
    folder: _posts/mecro
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: md
    format: frontmatter
    fields: *post_fields

  - name: posts_root
    label: "Posts (root)"
    label_singular: post
    folder: _posts
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: md
    format: frontmatter
    fields: *post_fields
