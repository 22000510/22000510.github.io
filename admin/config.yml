# Decap CMS — https://decapcms.org/docs/github-backend/
#
# GitHub Pages만 쓰는 경우(지금처럼 22000510.github.io):
# 기본 OAuth는 Netlify(api.netlify.com)를 씁니다. Netlify에 이 사이트가 없으면
# 로그인 직후 팝업에 "not found"가 뜹니다.
#
# 해결: OAuth 프록시를 하나 두고 backend.base_url 을 그 주소로 지정하세요.
# 가이드: https://github.com/sterlingwes/decap-proxy
#   1) GitHub → Developer settings → OAuth Apps → 콜백 URL = {프록시주소}/callback
#   2) Cloudflare Worker에 decap-proxy 배포 후 아래 두 줄의 주석을 해제하고 URL을 맞춤
#
# Netlify에 같은 저장소를 연결해 호스팅하는 경우에만 Netlify OAuth 안내:
# https://docs.netlify.com/security/oauth-provider-tokens/#using-an-authentication-provider

backend:
  name: github
  repo: 22000510/22000510.github.io
  branch: main
  # GitHub Pages + decap-proxy 배포 후 주석 해제:
  # base_url: https://YOUR_SUBDOMAIN.workers.dev
  # auth_endpoint: /auth

media_folder: assets/img
public_folder: /assets/img

collections:
  - name: posts
    label: Posts
    label_singular: post
    folder: _posts
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { label: Title, name: title, widget: string }
      - label: Publish date
        name: date
        widget: datetime
        date_format: YYYY-MM-DD
        time_format: HH:mm:ss
        format: YYYY-MM-DD HH:mm:ss Z
        picker_utc: false
      - label: Categories
        name: categories
        widget: list
        required: false
        field:
          label: Category
          name: category
          widget: string
      - label: Tag
        name: tag
        widget: list
        required: false
        field:
          label: Tag
          name: tag_item
          widget: string
      - { label: Body, name: body, widget: markdown }
