# Decap CMS — https://decapcms.org/docs/github-backend/
#
# Netlify OAuth를 쓰는 경우
# - GitHub OAuth 앱의 Authorization callback URL:
#     https://api.netlify.com/auth/done
# - Netlify → Site configuration → Access & security → OAuth → GitHub 에 Client ID/Secret 등록
#   https://docs.netlify.com/security/oauth-provider-tokens/#setup-an-provider
#
# CMS를 GitHub Pages(22000510.github.io)에서 열면, 기본값으로 site_id 가 github.io 로 나갑니다.
# Netlify는 "Netlify에 연결된 사이트"만 인식하므로, 아래 site_domain 을 반드시
# Netlify 대시보드에 보이는 사이트 주소(예: random-name-123.netlify.app)로 바꿉니다.
#
# Netlify 없이 GitHub Pages만 쓸 때는 OAuth 프록시가 필요합니다.
# https://github.com/sterlingwes/decap-proxy

backend:
  name: github
  repo: 22000510/22000510.github.io
  branch: main
  base_url: https://api.netlify.com
  auth_endpoint: auth
  # 호스트만 (https·슬래시 없음).
  # 팝업에 "Authorized"만 보이고 안 닫히면: OAuth는 성공했지만 부모 창으로 토큰 전달(postMessage)이 실패한 경우가 많음
  # (GitHub 로그인 페이지를 거치며 window.opener 가 끊김). 대응: 아래 site_domain 과 같은 Netlify URL에서 /admin 을 연 뒤
  # 로그인 재시도 · 팝업 허용 · 광고/보안 확장 끄기 · 다른 브라우저 시도.
  site_domain: ephemeral-creponne-6bdb92.netlify.app

media_folder: assets/img
public_folder: /assets/img

collections:
  - name: posts
    label: Posts
    label_singular: post
    folder: _posts
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { label: Title, name: title, widget: string }
      - label: Publish date
        name: date
        widget: datetime
        date_format: YYYY-MM-DD
        time_format: HH:mm:ss
        format: YYYY-MM-DD HH:mm:ss Z
        picker_utc: false
      - label: Categories
        name: categories
        widget: list
        required: false
        field:
          label: Category
          name: category
          widget: string
      - label: Tag
        name: tag
        widget: list
        required: false
        field:
          label: Tag
          name: tag_item
          widget: string
      - { label: Body, name: body, widget: markdown }
